interface:
  display_name: "批量服装平铺白底图"
  short_description: "一张服装图生成一张2000像素方形白底商品主图，去除背景/模特并精修平整褶皱和轮廓"
  default_prompt: "Use $batch-clothing-white-bg-images to turn each uploaded clothing image or folder image into one ecommerce-ready front-facing flat-lay or straight-hanging clothing main image on a 1:1 2000x2000 pure-white background. If the source is a casual floor flat-lay, rough cutout, or wrinkled sample photo, polish it like an ecommerce main image: reduce distracting wrinkles and lumpy bulges, tidy sleeves, cuffs, waistband, hem, trouser legs, collar/neckline, side seams, and silhouette, remove floor residue and edge artifacts, and keep the product centered and sellable. If the source shows a model/person, remove the model/person, face, hair, skin, hands, arms, legs, feet, shoes, jewelry, bag, phone, props, ghost-mannequin shape, hollow-body shape, and worn pose; reconstruct the garment into a complete, symmetric, naturally spread product image while preserving visible color, fabric, print, silhouette, closures, seams, ribbing, texture, pale-fabric detail, and product identity."
