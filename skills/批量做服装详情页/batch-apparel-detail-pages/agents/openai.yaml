interface:
  display_name: "批量做服装详情页"
  short_description: "按模板高相似度替换服装详情页，支持直接生成和2K高清"
  default_prompt: "Use $batch-apparel-detail-pages for template-protected apparel detail-page generation. The user provides one merchant template image plus one or more product material folders; each folder is one product. Treat the template as a layout contract, not inspiration. Preserve section order, image boxes, text boxes, typography, colors, spacing, table styles, icons, decorations, module shapes, and visual rhythm unless the user explicitly changes them. Always create template_slot_map before generation: section/image/text/logo/table boxes, decoration shapes, crop modes, subject safe zones, and module_shape_tags. Write template_replacement_plan.json. Use direct_generation when the user already provided template/materials and says to proceed, redo, or not ask mid-way: keep the plan and risk flags, but do not block final generation on confirmation. Apply module_shape_fidelity and style_tone_lock so the page does not become a new design. Replace every clearly replaceable slot with current product material; if a scene cannot use provided assets directly, generate matching scene material from the current product instead of pasting a white-background cutout. For digital-human/model slots, apply model_scene_quality_gates and candidate_pool_selection: current product clothing, template-like pose, expression, action, camera distance, subject scale, background, props, natural light, no white background, no wrong garment, no stiff/AI-looking model, choose from multiple candidates. Use lifestyle_scene_variation for repeated model-photo sections so the same image is not overused. For HD/2K requests, deliver native_2k_master at least 2160px wide with text, tables, lines, icons, and shapes redrawn at target resolution; do not only upscale a finished low-resolution PNG. Before final response, run preview_and_crop_qa and visual_similarity_audit on full preview, hero, details, size table, model scenes, and bottom repeat modules. Never invent product facts or copy unauthorized template logos, model photos, prices, sales, reviews, certifications, reports, or unverifiable claims."
